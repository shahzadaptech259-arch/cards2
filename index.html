<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<style>
    .card{
        /* margin-top:0px; */
        display: inline-block;
        margin: 10px;
        padding: 10px;
        /* background-color: aqua; */
        border-radius: 20px;
        box-sizing: border-box;
    }
    .img{
        height:250px ;
        width: 250px;
    }
</style>
</head>

<body>
<div id="container"></div>

<script>
var cardsData = [
    { title: "Apple", description: "it is a fruit", pricing: 500, img: "image/apple.jpg" },
    { title: "KIWI", description: "it is a fruit", pricing: 1000, img: "image/kiwi.jpg" },
    { title: "Guava", description: "it is a fruit", pricing: 800, img: "image/guava.jpg" }
];

var container = document.getElementById('container');
var cardhtml = '';

for (i = 0; i < cardsData.length; i++) {

    var card = cardsData[i];

    cardhtml += `
    <div class="card">
        <img src="${card.img}" class="card-img-top img" alt="...">

        <div class="card-body">
            <h5 class="card-title">${card.title}</h5>
            <p class="card-text">${card.description}</p>
            <a href="#" class="btn btn-primary">${card.pricing}</a>
        </div>
    </div>
    `;
}

container.innerHTML = cardhtml;
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
